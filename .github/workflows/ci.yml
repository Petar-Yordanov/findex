name: Qt CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_host: linux
            qt_target: desktop
            qt_arch: linux_gcc_64
            artifact_name: app-linux
            build_dir: build
            package_dir: dist

          - os: windows-latest
            qt_host: windows
            qt_target: desktop
            qt_arch: win64_msvc2022_64
            artifact_name: app-windows
            build_dir: build
            package_dir: dist

          - os: macos-latest
            qt_host: mac
            qt_target: desktop
            qt_arch: clang_64
            artifact_name: app-macos
            build_dir: build
            package_dir: dist

    env:
      QT_VERSION: 6.10.2
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb1 \
            libx11-xcb1 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libegl1 \
            libopengl0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target }}
          arch: ${{ matrix.qt_arch }}
          cache: true
          setup-python: true
          install-deps: false

      - name: Show Qt paths
        shell: bash
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          find "$QT_ROOT_DIR" -maxdepth 4 -type d \( -name Qt6 -o -name cmake \) | head -50 || true

      - name: Show compiler environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          where cl
          where link
          where cmake
          where ninja
          where gcc
          where g++

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item Env:CC -ErrorAction SilentlyContinue
          Remove-Item Env:CXX -ErrorAction SilentlyContinue

          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DQt6_ROOT="$env:QT_ROOT_DIR"

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DQt6_ROOT="$QT_ROOT_DIR"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build "${{ matrix.build_dir }}" --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build "${{ matrix.build_dir }}" --config ${{ env.BUILD_TYPE }} --parallel

      - name: Collect build output (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "${{ matrix.package_dir }}"
          cp -R "${{ matrix.build_dir }}/." "${{ matrix.package_dir }}/"

      - name: Collect build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ matrix.package_dir }}" | Out-Null
          Copy-Item -Recurse -Force "${{ matrix.build_dir }}\*" "${{ matrix.package_dir }}\"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_dir }}
          if-no-files-found: error
