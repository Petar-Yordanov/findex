name: Qt CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_host: linux
            qt_target: desktop
            qt_arch: linux_gcc_64
            artifact_name: app-linux
            build_dir: build
            package_dir: dist

          - os: windows-latest
            qt_host: windows
            qt_target: desktop
            qt_arch: win64_msvc2022_64
            artifact_name: app-windows
            build_dir: build
            package_dir: dist

          - os: macos-latest
            qt_host: mac
            qt_target: desktop
            qt_arch: clang_64
            artifact_name: app-macos
            build_dir: build
            package_dir: dist

    env:
      QT_VERSION: 6.10.2
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb1-dev \
            libx11-xcb-dev \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libegl1 \
            libopengl0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target }}
          arch: ${{ matrix.qt_arch }}
          cache: true
          setup-python: true
          install-deps: false

      - name: Show Qt paths
        shell: bash
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          find "$QT_ROOT_DIR" -maxdepth 4 -type d \( -name Qt6 -o -name cmake \) | head -50 || true

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item Env:CC -ErrorAction SilentlyContinue
          Remove-Item Env:CXX -ErrorAction SilentlyContinue

          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DQt6_ROOT="$env:QT_ROOT_DIR"

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DQt6_ROOT="$QT_ROOT_DIR"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build "${{ matrix.build_dir }}" --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build "${{ matrix.build_dir }}" --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ matrix.package_dir }}"

          EXE=$(find "${{ matrix.build_dir }}" -maxdepth 3 -type f -name "appFileExplorer" | head -n 1)
          if [ -z "$EXE" ]; then
            echo "appFileExplorer not found"
            exit 1
          fi

          cp "$EXE" "${{ matrix.package_dir }}/"

          echo "Packaged files:"
          find "${{ matrix.package_dir }}" -maxdepth 3 -type f

      - name: Package app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ matrix.package_dir }}"

          APP_BUNDLE=$(find "${{ matrix.build_dir }}" -maxdepth 3 -name "appFileExplorer.app" | head -n 1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "appFileExplorer.app not found"
            exit 1
          fi

          cp -R "$APP_BUNDLE" "${{ matrix.package_dir }}/"

          MACDEPLOYQT=$(find "$QT_ROOT_DIR" -name macdeployqt | head -n 1)
          if [ -z "$MACDEPLOYQT" ]; then
            echo "macdeployqt not found"
            exit 1
          fi

          "$MACDEPLOYQT" "${{ matrix.package_dir }}/appFileExplorer.app" \
            -qmldir="$GITHUB_WORKSPACE" \
            -verbose=2

          # Remove SQL drivers if your app does not use Qt SQL.
          # This avoids broken references like libmimerapi.dylib getting dragged in.
          rm -rf "${{ matrix.package_dir }}/appFileExplorer.app/Contents/PlugIns/sqldrivers" || true

          # Ad-hoc sign to make the bundle structurally launchable in local testing.
          # This is NOT a substitute for proper Developer ID signing + notarization.
          codesign --force --deep --sign - "${{ matrix.package_dir }}/appFileExplorer.app"

          cd "${{ matrix.package_dir }}"
          ditto -c -k --sequesterRsrc --keepParent "appFileExplorer.app" "app-macos.zip"
          rm -rf "appFileExplorer.app"

          echo "Packaged files:"
          find . -maxdepth 4

      - name: Package app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path "${{ matrix.package_dir }}" | Out-Null

          $exe = Get-ChildItem -Path "${{ matrix.build_dir }}" -Recurse -Filter "appFileExplorer.exe" |
            Select-Object -First 1

          if (-not $exe) {
            throw "appFileExplorer.exe not found"
          }

          Copy-Item $exe.FullName "${{ matrix.package_dir }}\" -Force

          $deployTool = Get-ChildItem -Path $env:QT_ROOT_DIR -Recurse -Filter "windeployqt.exe" |
            Select-Object -First 1

          if (-not $deployTool) {
            throw "windeployqt.exe not found under QT_ROOT_DIR=$env:QT_ROOT_DIR"
          }

          & $deployTool.FullName `
            --release `
            --compiler-runtime `
            --qmldir "$env:GITHUB_WORKSPACE" `
            --dir "${{ matrix.package_dir }}" `
            "${{ matrix.package_dir }}\appFileExplorer.exe"

          Write-Host "Packaged files:"
          Get-ChildItem -Recurse "${{ matrix.package_dir }}"

      - name: Smoke test packaged app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exePath = Resolve-Path "${{ matrix.package_dir }}\appFileExplorer.exe"

          $proc = Start-Process -FilePath $exePath `
            -WorkingDirectory (Resolve-Path "${{ matrix.package_dir }}") `
            -PassThru

          Start-Sleep -Seconds 5

          if ($proc.HasExited) {
            Write-Host "App exited immediately, rerunning with QT_DEBUG_PLUGINS=1"
            $env:QT_DEBUG_PLUGINS = "1"
            & $exePath
            throw "appFileExplorer.exe exited immediately with code $($proc.ExitCode)"
          }

          Stop-Process -Id $proc.Id -Force

      - name: Zip app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.package_dir }}\*" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_dir }}
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_dir }}/app-macos.zip
          if-no-files-found: error
